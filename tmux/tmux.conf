# Declare variables
%hidden TMUX_CONFIG_DIR="$XDG_CONFIG_HOME/tmux"
%hidden TMUX_PACKAGE_MANAGER_DIR="$XDG_CONFIG_HOME/tmux/plugins/tpm"

# Set the leader to M-Space
unbind M-Space
set -g prefix M-Space
bind M-Space send-prefix

# Window settings

# Start counting at one
set -g base-index 1
setw -g pane-base-index 1

# Switch to other session when closing current session
set-option -g detach-on-destroy off

# Enable mouse support
set -g mouse on

# Enable clickable links in supported terminals
set -as terminal-features ",*:hyperlinks" 

# Ensure window index numbers get reordered on delete.
set-option -g renumber-windows on

# Scrollback history
set -g history-limit 10000

# Focus events enabled for terminals that support them
set -g focus-events on

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Vi mode for copy-pasting
set-window-option -g mode-keys vi

# Clipboard integration
set -g set-clipboard on

# Reload the file with prefix r
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "Reloaded!"

# Show the which-key menu
bind ? run-shell "tmux show-wk-menu-root"

# Navigate panes with hjkl (via vim-tmux-navigator)
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

# Show lazygit with prefix g
bind g display-popup -E -B -w "80%" -h "80%" "lazygit"

# Open or switch project (CMD+SHIFT+o) with prefix + o
unbind o
bind o run-shell -E "$TMUX_CONFIG_DIR/select-project" 

# Switch to session with prefix + p
unbind p
bind p run-shell -E "$TMUX_CONFIG_DIR/select-session"

# Open new window with prefix + t
unbind t
bind t new-window -c "#{pane_current_path}"

# Better splitting
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Switch windows (tabs) with prefix + number
bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9
bind-key 0 select-window -t :10

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Theme
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_plugins 'pomodoro,cpu,memory,git'
set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'storm'

# Initialize TMUX plugin manager 
# (keep this line at the very bottom of tmux.conf)
run "$TMUX_PACKAGE_MANAGER_DIR/tpm"
