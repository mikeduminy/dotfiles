# Declare variables
%hidden TMUX_CONFIG_DIR="$XDG_CONFIG_HOME/tmux"
%hidden TMUX_PACKAGE_MANAGER_DIR="$XDG_CONFIG_HOME/tmux/plugins/tpm"

# Set the leader to M-Space
unbind M-Space
set -g prefix M-Space
bind M-Space send-prefix

set -g mouse on # Enable mouse support
set -as terminal-features ",*:hyperlinks" # Enable clickable links in supported terminals

set -g focus-events on   # Focus events enabled for terminals that support them
set -g display-time 4000 # Increase tmux messages display duration from 750ms to 4s
set -g set-clipboard on  # Clipboard integration
setw -g mode-keys vi     # Vi mode for copy-pasting

set -g display-time 2000          # By default, status msg disappears in the blink of an eye (750ms)
set -g display-panes-time 2000    # By default, pane number disappears in 1 s
set -g history-limit 20000        # maximum number of lines held in window history - crank it up from 2k default
# set -g lock-after-time 3600       # lock the session after 60 mins of inactivity. Sometimes, it is good to protect your screen to make sure other's can't see enough.
set -wg automatic-rename off      # default names are too vague to see. Let me name it.

set -g base-index 1               # Start counting windows at one
setw -g pane-base-index 1         # Start counting panes at one
set-option -g renumber-windows on # Ensure window index numbers get reordered on delete.

set-option -g detach-on-destroy off # Switch to other session when closing current session

# word separators for automatic word selection
set-window-option -g word-separators ' @"=()[]'  # default => ‘ -_@’.

# tmux adds a short, almost imperceptible delay between the commands that can cause funny behavior when running vim inside tmux.
set-option -s escape-time 0

# Command Prompt Movements:  within the tmux command prompt and the command prompt is accessed using <P>: (in the status line)
set-option -g status-keys vi

bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "Reloaded!" # Reload the file with prefix r
bind ? run-shell "tmux show-wk-menu-root" # Show the which-key menu

# Navigate panes with hjkl (via vim-tmux-navigator)
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }
bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

# Show lazygit with prefix g
bind g display-popup -E -B -w "80%" -h "80%" "lazygit"

# Open or switch project (CMD+SHIFT+o) with prefix + o
unbind o
bind o run-shell -E "$TMUX_CONFIG_DIR/select-project" 

# Switch to session with prefix + s
unbind s
bind s run-shell -E "$TMUX_CONFIG_DIR/select-session"

# Open new window with prefix + t
unbind t
bind t new-window -c "#{pane_current_path}"

# Better splitting
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Switch windows (tabs) with prefix + number
bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9
bind-key 0 select-window -t :10

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'

# persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-resurrect' 
# automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-continuum'

# Theme
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_plugins 'pomodoro,cpu,memory,git'
set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'storm'

# Initialize TMUX plugin manager 
# (keep this line at the very bottom of tmux.conf)
run "$TMUX_PACKAGE_MANAGER_DIR/tpm"
